<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chew Babka — Játéksarok</title>
  <link rel="icon" href="assets/csoki.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #1e0302; --cream: #fff6df; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--cream); color: var(--ink);
      font-family: 'Patrick Hand', cursive; text-align: center;
      display: flex; flex-direction: column; align-items: center; padding: 16px;
    }
    .logo { width: min(420px, 86vw); margin-top: 8px; }
    h1 { font-size: 2.2rem; font-weight: normal; margin: -10px 0 24px; letter-spacing: 2px; }
    .games { display: flex; flex-wrap: wrap; gap: 26px; justify-content: center; max-width: 980px; }
    .card {
      display: block; width: 260px; padding: 22px 18px 18px; color: var(--ink); text-decoration: none;
      border: 3px solid var(--ink); background: var(--cream);
      border-radius: 58% 42% 55% 45% / 12% 14% 11% 13%;
      transition: transform 0.15s ease;
    }
    .card:nth-child(2) { border-radius: 45% 55% 42% 58% / 13% 11% 14% 12%; }
    .card:nth-child(3) { border-radius: 52% 48% 57% 43% / 11% 13% 12% 14%; }
    .card:hover { transform: rotate(-1.5deg) scale(1.04); }
    .card:nth-child(2):hover { transform: rotate(1.5deg) scale(1.04); }
    .card img { height: 130px; }
    .card h2 { font-size: 1.7rem; font-weight: normal; margin: 10px 0 2px; }
    .card p { margin: 0; opacity: 0.7; font-size: 1.1rem; }
    footer { margin-top: auto; padding-top: 30px; opacity: 0.6; font-size: 1rem; }
    footer a { color: var(--ink); }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo.png" alt="Chew Babka">
  <h1>~ játéksarok ~</h1>
  <div class="games">
    <a class="card" href="catch.html">
      <img src="assets/player.png" alt="">
      <h2>Töltelékzápor</h2>
      <p>Kapd el a hulló tölteléket — a mazsolát kerüld!</p>
    </a>
    <a class="card" href="match3.html">
      <img src="assets/makos.png" alt="">
      <h2>Töltelék Trió</h2>
      <p>Párosíts hármat, teljesítsd a rendeléseket!</p>
    </a>
    <a class="card" href="snake.html">
      <img src="assets/dio.png" alt="">
      <h2>Végtelen Babka</h2>
      <p>Nőj egyre hosszabbra — csak magadba ne harapj!</p>
    </a>
  </div>
  <footer>friss kézműves babka: <a href="https://www.chew-babka.com/">chew-babka.com</a></footer>
</body>
</html>
